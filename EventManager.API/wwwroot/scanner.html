<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Scanner QR — EventManager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1e293b;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 17px; font-weight: 600; color: #60a5fa; }

    .container { width: 100%; max-width: 480px; padding: 20px 16px; flex: 1; }

    /* ── Auth section ─────────────────────────────────────── */
    #auth-section {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    #auth-section h2 { font-size: 14px; color: #94a3b8; margin-bottom: 10px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"], input[type="password"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #60a5fa; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #334155; cursor: not-allowed; }

    /* ── Event info ───────────────────────────────────────── */
    #event-info {
      background: #1e293b;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
      font-size: 13px;
      display: none;
    }
    #event-info span { color: #94a3b8; }
    #event-id-display { color: #60a5fa; font-family: monospace; word-break: break-all; }

    /* ── Camera ───────────────────────────────────────────── */
    #camera-section {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
      margin-bottom: 16px;
      position: relative;
    }
    #video {
      width: 100%;
      display: block;
      aspect-ratio: 1;
      object-fit: cover;
      background: #000;
    }
    #canvas { display: none; }

    /* Scanning overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 55%;
      aspect-ratio: 1;
      border: 3px solid #60a5fa;
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { border-color: #60a5fa; }
      50%       { border-color: #3b82f6; }
    }

    #camera-status {
      padding: 10px 16px;
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      background: #1e293b;
    }

    .btn-camera {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    /* ── Result card ──────────────────────────────────────── */
    #result {
      border-radius: 12px;
      padding: 18px;
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #result.success { background: #052e16; border: 1px solid #16a34a; }
    #result.error   { background: #1c0a0a; border: 1px solid #dc2626; }
    #result h3 { font-size: 16px; margin-bottom: 8px; }
    #result.success h3 { color: #4ade80; }
    #result.error   h3 { color: #f87171; }
    #result p { font-size: 14px; color: #cbd5e1; line-height: 1.5; }
    #result .detail { margin-top: 10px; font-size: 13px; color: #94a3b8; }
    #result .detail strong { color: #e2e8f0; }

    .btn-scan-again {
      width: 100%;
      margin-top: 12px;
      background: #334155;
      border-radius: 8px;
    }
    .btn-scan-again:hover { background: #475569; }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
    <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
    <rect x="7" y="7" width="4" height="4" rx="1"/><rect x="13" y="7" width="4" height="4" rx="1"/>
    <rect x="7" y="13" width="4" height="4" rx="1"/><path d="M13 13h4v4"/>
  </svg>
  <h1>Scanner QR — EventManager</h1>
</header>

<div class="container">

  <!-- Auth -->
  <div id="auth-section">
    <h2>Token de autenticación (JWT)</h2>
    <div class="input-row">
      <input type="password" id="jwt-input" placeholder="Pega tu Bearer token aquí…" autocomplete="off" />
      <button onclick="saveToken()">OK</button>
    </div>
  </div>

  <!-- Event info -->
  <div id="event-info">
    <span>Validando inscripciones del evento:</span><br/>
    <span id="event-id-display"></span>
  </div>

  <!-- Camera + controls -->
  <button class="btn-camera" id="btn-start" onclick="startCamera()">
    📷&nbsp; Iniciar cámara
  </button>

  <div id="camera-section">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="scan-overlay"><div class="scan-frame"></div></div>
  </div>
  <div id="camera-status">Cámara no iniciada</div>

  <!-- Result -->
  <div id="result">
    <h3 id="result-title"></h3>
    <p id="result-message"></p>
    <div class="detail" id="result-detail"></div>
    <button class="btn-scan-again" onclick="scanAgain()">Escanear otro código</button>
  </div>

</div>

<!-- jsQR (CDN, sin dependencias) -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const eventId  = params.get('eventId') || '';
const API_BASE = '';            // same origin

let stream     = null;
let scanning   = false;
let rafId      = null;

// Show event ID in UI
if (eventId) {
  document.getElementById('event-info').style.display = 'block';
  document.getElementById('event-id-display').textContent = eventId;
}

// Try to restore saved token
if (localStorage.getItem('em_jwt')) {
  document.getElementById('jwt-input').value = '(guardado)';
}

function saveToken() {
  const v = document.getElementById('jwt-input').value.trim();
  if (v && v !== '(guardado)') {
    localStorage.setItem('em_jwt', v);
    document.getElementById('jwt-input').value = '(guardado)';
    alert('Token guardado.');
  }
}

function getToken() {
  return localStorage.getItem('em_jwt') || '';
}

// ── Camera ─────────────────────────────────────────────────────────────────
async function startCamera() {
  if (!eventId) {
    alert('Falta el parámetro ?eventId=... en la URL.\nEjemplo: scanner.html?eventId=tu-guid-aquí');
    return;
  }
  if (!getToken()) {
    alert('Ingresa tu token JWT primero.');
    return;
  }

  document.getElementById('camera-section').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('btn-start').disabled = true;

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      scanning = true;
      document.getElementById('camera-status').textContent = 'Apunta la cámara al código QR…';
      rafId = requestAnimationFrame(tick);
    };
  } catch (err) {
    document.getElementById('camera-status').textContent = 'Error: ' + err.message;
    document.getElementById('btn-start').disabled = false;
  }
}

// ── QR scan loop ───────────────────────────────────────────────────────────
function tick() {
  if (!scanning) return;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');

  if (video.readyState !== video.HAVE_ENOUGH_DATA) {
    rafId = requestAnimationFrame(tick);
    return;
  }

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, {
    inversionAttempts: 'dontInvert'
  });

  if (code && code.data) {
    scanning = false;
    handleQr(code.data.trim());
  } else {
    rafId = requestAnimationFrame(tick);
  }
}

// ── Handle decoded QR ──────────────────────────────────────────────────────
async function handleQr(raw) {
  document.getElementById('camera-status').textContent = 'Validando…';
  stopCamera();

  try {
    const res = await fetch(`${API_BASE}/api/checkin/validate`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      },
      body: JSON.stringify({ token: raw, eventId })
    });

    const data = await res.json();
    showResult(data);
  } catch (err) {
    showResult({ success: false, message: 'Error de red: ' + err.message });
  }
}

// ── Result display ─────────────────────────────────────────────────────────
function showResult(data) {
  const card = document.getElementById('result');
  card.className = data.success ? 'success' : 'error';
  card.style.display = 'block';

  document.getElementById('result-title').textContent =
    data.success ? '✅ Check-in exitoso' : '❌ Acceso denegado';
  document.getElementById('result-message').textContent = data.message;

  const detail = document.getElementById('result-detail');
  if (data.userFullName) {
    detail.innerHTML =
      `<strong>Usuario:</strong> ${data.userFullName}<br/>` +
      (data.eventName ? `<strong>Evento:</strong> ${data.eventName}<br/>` : '') +
      (data.checkedInAt ? `<strong>Hora:</strong> ${new Date(data.checkedInAt).toLocaleTimeString('es-CO')}` : '');
  } else {
    detail.textContent = '';
  }

  document.getElementById('camera-status').textContent = 'Escaneo completado.';
}

function scanAgain() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('btn-start').disabled = false;
  startCamera();
}

function stopCamera() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}
</script>
</body>
</html>
